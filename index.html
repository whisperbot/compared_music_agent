<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐配乐效果评测</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .header-card h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: #333;
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .header-card p {
            text-align: center;
            color: #666;
            font-size: 1.1rem;
            margin: 0;
        }
        .progress-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .progress-text {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .progress .determinate {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }
        .user-input-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
        }
        .user-input-card h5 {
            color: #333;
            margin-bottom: 30px;
            font-weight: 400;
        }
        .input-field {
            max-width: 400px;
            margin: 0 auto 20px auto !important;
        }
        .input-field input {
            font-size: 1.2rem;
            text-align: center;
        }
        .input-field label {
            font-size: 1rem;
        }
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 25px;
            padding: 0 40px;
            height: 50px;
            line-height: 50px;
            font-size: 1.1rem;
            text-transform: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .start-btn:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .video-grid {
            display: grid;
            gap: 25px;
            margin-bottom: 30px;
            transition: all 0.5s ease;
        }
        .video-grid.cols-2, .video-grid.cols-3 {
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }
        .video-grid.cols-4 {
            grid-template-columns: repeat(2, 1fr);
        }
        @media (max-width: 992px) {
            .video-grid.cols-4 {
                grid-template-columns: 1fr;
            }
        }
        .video-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }
        .video-card .card-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-size: 1.3rem;
            font-weight: 400;
            text-align: center;
            margin: 0;
        }
        .video-card .card-content {
            padding: 15px;
        }
        .video-card video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        .vote-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .vote-section h5 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-weight: 400;
        }
        .vote-buttons {
            display: grid;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }
        .vote-buttons.cols-2 {
            grid-template-columns: repeat(2, 1fr);
        }
        .vote-buttons.cols-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        .vote-buttons.cols-4 {
            grid-template-columns: repeat(3, 1fr);
        }
        @media (max-width: 768px) {
            .vote-buttons {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }
        .vote-btn {
            border-radius: 12px;
            height: auto;
            padding: 15px 20px;
            font-size: 1rem;
            text-transform: none;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .vote-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .vote-btn.best {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .vote-btn.all-good {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .vote-btn.all-bad {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .done-message {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease forwards;
        }
        .done-message i {
            font-size: 5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .done-message h2 {
            color: #333;
            font-weight: 300;
            margin: 20px 0 15px 0;
        }
        .done-message p {
            color: #666;
            font-size: 1.1rem;
        }
        .hidden {
            display: none;
        }
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(102, 126, 234, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .transition-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .transition-overlay .icon {
            font-size: 6rem;
            color: white;
            animation: bounceIn 0.6s ease;
        }
        .transition-overlay .message {
            color: white;
            font-size: 1.5rem;
            margin-top: 20px;
            font-weight: 300;
            animation: fadeInUp 0.5s ease 0.2s forwards;
            opacity: 0;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="transition-overlay" id="transitionOverlay">
        <i class="material-icons icon" id="transitionIcon">check_circle</i>
        <div class="message" id="transitionMessage">太棒了！继续加油！</div>
    </div>

    <div class="main-container">
        <div class="header-card">
            <h1><i class="material-icons" style="font-size: 3rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">music_note</i> 音乐配乐效果评测</h1>
            <p>请观看视频，选择你认为效果最好的版本</p>
        </div>

        <div class="progress-section">
            <div class="progress-text" id="progressText">等待开始...</div>
            <div class="progress">
                <div class="determinate" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="user-input-card" id="userInput">
            <h5><i class="material-icons" style="vertical-align: middle; margin-right: 8px;">person</i>请输入你的姓名开始评测</h5>
            <div class="input-field">
                <input id="userName" type="text" class="validate" onkeypress="if(event.key==='Enter') start()">
                <label for="userName">姓名</label>
            </div>
            <button class="btn waves-effect waves-light start-btn" onclick="start()">
                开始评测
                <i class="material-icons right">arrow_forward</i>
            </button>
        </div>

        <div id="content" class="hidden">
            <div class="video-grid" id="videoGrid">
            </div>

            <div class="vote-section">
                <h5><i class="material-icons" style="vertical-align: middle; margin-right: 8px;">how_to_vote</i>请选择你认为效果最好的版本</h5>
                <div class="vote-buttons" id="voteButtons">
                </div>
            </div>
        </div>

        <div id="doneMessage" class="hidden done-message">
            <i class="material-icons">celebration</i>
            <h2>评测完成！</h2>
            <p>非常感谢你的参与，你的反馈对我们很重要~</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        let userName = '';
        let currentVideo = null;
        let videoCount = 4;

        const encouragements = [
            { icon: 'thumb_up', message: '太棒了！继续加油！' },
            { icon: 'star', message: '做得好！你真专业！' },
            { icon: 'emoji_events', message: '出色！保持这个节奏！' },
            { icon: 'favorite', message: '感谢你的认真评价！' },
            { icon: 'bolt', message: '效率真高！继续！' },
            { icon: 'local_fire_department', message: '太厉害了！火力全开！' },
            { icon: 'psychology', message: '很有眼光！继续！' },
            { icon: 'celebration', message: '完美！继续下一个！' }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            M.updateTextFields();
            loadConfig();
        });

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                videoCount = data.video_count;
            } catch (e) {
                console.error('加载配置失败', e);
            }
        }

        function start() {
            userName = document.getElementById('userName').value.trim();
            if (!userName) {
                M.toast({html: '请输入你的姓名', classes: 'rounded red'});
                return;
            }
            document.getElementById('userInput').classList.add('hidden');
            loadNextVideo();
        }

        async function loadNextVideo() {
            try {
                const res = await fetch('/api/next', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_name: userName})
                });
                const data = await res.json();
                
                if (data.done) {
                    document.getElementById('content').classList.add('hidden');
                    document.getElementById('doneMessage').classList.remove('hidden');
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressText').textContent = '已完成全部评测！';
                    return;
                }

                currentVideo = data.video;
                videoCount = data.video_count || 4;
                
                document.getElementById('progressFill').style.width = data.progress.percent + '%';
                document.getElementById('progressText').textContent = 
                    `当前进度：${data.progress.done + 1} / ${data.progress.total} (${data.progress.percent}%)`;
                
                renderVideos();
                renderVoteButtons();
                document.getElementById('content').classList.remove('hidden');
            } catch (e) {
                M.toast({html: '加载失败，请刷新重试', classes: 'rounded red'});
                console.error(e);
            }
        }

        function renderVideos() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            grid.className = `video-grid cols-${videoCount}`;
            
            const labels = ['A', 'B', 'C', 'D'];
            const colors = ['#667eea', '#764ba2', '#11998e', '#f093fb'];
            
            currentVideo.urls.forEach((url, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="card-title" style="background: linear-gradient(135deg, ${colors[index]} 0%, ${colors[(index+1)%4]} 100%);">
                        版本 ${labels[index]}
                    </div>
                    <div class="card-content">
                        <video controls preload="metadata">
                            <source src="${url}" type="video/mp4">
                            你的浏览器不支持视频播放
                        </video>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderVoteButtons() {
            const container = document.getElementById('voteButtons');
            container.innerHTML = '';
            container.className = `vote-buttons cols-${videoCount}`;
            
            const labels = ['A', 'B', 'C', 'D'];
            
            for (let i = 0; i < videoCount; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn waves-effect vote-btn best';
                btn.innerHTML = `<i class="material-icons left">check_circle</i>版本${labels[i]}最好`;
                btn.onclick = () => vote(i + 1);
                container.appendChild(btn);
            }
            
            const allGoodBtn = document.createElement('button');
            allGoodBtn.className = 'btn waves-effect vote-btn all-good';
            allGoodBtn.innerHTML = `<i class="material-icons left">thumb_up</i>都不错`;
            allGoodBtn.onclick = () => vote(5);
            container.appendChild(allGoodBtn);
            
            const allBadBtn = document.createElement('button');
            allBadBtn.className = 'btn waves-effect vote-btn all-bad';
            allBadBtn.innerHTML = `<i class="material-icons left">thumb_down</i>都不好`;
            allBadBtn.onclick = () => vote(6);
            container.appendChild(allBadBtn);
        }

        function showTransition() {
            const overlay = document.getElementById('transitionOverlay');
            const icon = document.getElementById('transitionIcon');
            const message = document.getElementById('transitionMessage');
            
            const randomItem = encouragements[Math.floor(Math.random() * encouragements.length)];
            icon.textContent = randomItem.icon;
            message.textContent = randomItem.message;
            
            overlay.classList.add('show');
            
            setTimeout(() => {
                overlay.classList.remove('show');
            }, 800);
        }

        async function vote(version) {
            if (!currentVideo) return;
            
            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_name: userName,
                        video_id: currentVideo.id,
                        best_version: version
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showTransition();
                    setTimeout(() => {
                        loadNextVideo();
                    }, 500);
                } else {
                    M.toast({html: '提交失败，请重试', classes: 'rounded red'});
                }
            } catch (e) {
                M.toast({html: '提交失败，请重试', classes: 'rounded red'});
                console.error(e);
            }
        }
    </script>
</body>
</html>
